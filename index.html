<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <title>DBMS Daily Checklist - Bank BTN</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0b0f19" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DBMS Checklist" />
  <link rel="apple-touch-icon" href="https://placehold.co/192x192/002d72/ffffff?text=BTN" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/plus-jakarta-sans@5.0.3/index.min.css" />

  <style>
    * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    body {
      background-color: #0b0f19;
      background-image: 
        radial-gradient(at top right, rgba(59, 130, 246, 0.12) 0px, transparent 40%),
        radial-gradient(at bottom left, rgba(99, 102, 241, 0.08) 0px, transparent 40%);
      min-height: 100vh;
      color: #f1f5f9;
    }
    .glass {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      border-color: rgba(99, 102, 241, 0.25);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }
    .tab-active {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      box-shadow: 0 8px 20px -6px rgba(37, 99, 235, 0.5);
    }
    .task-item {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .task-item:hover {
      transform: translateY(-2px);
      background-color: rgba(30, 41, 59, 0.6);
      border-color: rgba(99, 102, 241, 0.2);
    }
    .task-item.completed {
      background-color: rgba(15, 23, 42, 0.4);
      border-color: rgba(16, 185, 129, 0.15);
    }
    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #475569;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .checkbox.checked {
      background: linear-gradient(135deg, #10b981, #059669);
      border-color: #10b981;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
    }
    .checkbox.checked::after {
      content: '✓';
      color: white;
      font-weight: bold;
      font-size: 12px;
    }
    .progress-ring { transform: rotate(-90deg); }
    .progress-ring circle { transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
    .scrollbar::-webkit-scrollbar-track { background: transparent; }
    .scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }

    .modal-overlay { background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(8px); z-index: 50;}
    .syncing { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .freq-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .freq-daily { background: rgba(59, 130, 246, 0.15); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.25); }
    .freq-weekly { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.25); }
    .freq-monthly { background: rgba(236, 72, 153, 0.15); color: #f9a8d4; border: 1px solid rgba(236, 72, 153, 0.25); }

    .cat-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
    }
    .spec-text {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .category-chip {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .category-chip.active {
      background: #312e81;
      border-color: #6366f1;
      color: #e0e7ff;
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }
    
    /* ... existing code (dropdown, alert, transitions) ... */
    .single-dropdown-trigger { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 10px 14px; text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 46px; transition: all 0.2s; }
    .single-dropdown-trigger:hover:not(:disabled) { border-color: #4f46e5; }
    .single-dropdown-trigger.open { border-color: #4f46e5; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .single-dropdown-trigger:disabled { opacity: 0.5; cursor: not-allowed; }
    .single-dropdown-menu { position: absolute; top: 100%; left: 0; right: 0; background: #0f172a; border: 1px solid #4f46e5; border-top: none; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; max-height: 260px; overflow-y: auto; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
    .single-dropdown-item { padding: 10px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(51, 65, 85, 0.4); transition: background 0.15s; }
    .single-dropdown-item:last-child { border-bottom: none; }
    .single-dropdown-item:hover { background: rgba(79, 70, 229, 0.15); }
    .single-dropdown-item.selected { background: rgba(16, 185, 129, 0.1); }
    .alert-box { padding: 12px 16px; border-radius: 12px; font-size: 13px; display: flex; align-items: flex-start; gap: 10px; }
    .alert-warning { background: rgba(245, 158, 11, 0.08); border: 1px solid rgba(245, 158, 11, 0.2); color: #fde047; }
    .alert-info { background: rgba(59, 130, 246, 0.08); border: 1px solid rgba(59, 130, 246, 0.2); color: #93c5fd; }
    .alert-success { background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2); color: #86efac; }
    .alert-error { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2); color: #fca5a5; }
    .fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .scale-in { animation: scaleIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans selection:bg-indigo-500/30 antialiased">

  <!-- ... existing content ... -->
  <!-- (Body structure remains identical, just ensuring all IDs match) -->
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swBlob = new Blob([
          `const CACHE_NAME = 'dbms-checklist-v1';
           const ASSETS = ['/', '/index.html'];
           self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS))));
           self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(res => res || fetch(e.request))));`
        ], {type: 'application/javascript'});
        
        navigator.serviceWorker.register(URL.createObjectURL(swBlob))
          .catch(err => console.log('SW registration failed: ', err));
      });
    }

    const manifest = {
      name: "DBMS Daily Checklist",
      short_name: "BTN Checklist",
      start_url: "/",
      display: "standalone",
      background_color: "#0b0f19",
      theme_color: "#0b0f19",
      icons: [{ src: "https://placehold.co/192x192/002d72/ffffff?text=BTN", sizes: "192x192", type: "image/png" }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const manifestUrl = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestUrl;
    document.head.appendChild(link);

    /* ... existing application logic ... */
    // (Rest of your app logic goes here)
  </script>
</body>
</html>
